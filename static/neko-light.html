<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEKO.TRADING</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --accent-green: #00d26a;
            --accent-red: #ff4757;
            --accent-blue: #3b82f6;
            --accent-yellow: #fbbf24;
            --accent-purple: #a855f7;
            --border-color: #2a2a3a;
        }
        
        [data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b7a;
            --border-color: #e0e0e0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .theme-toggle:hover {
            background: var(--accent-blue);
            color: white;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }
        
        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .stat-value.g { color: var(--accent-green); }
        .stat-value.r { color: var(--accent-red); }
        .stat-value.c { color: var(--accent-yellow); }
        
        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 1024px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }
        
        .chart-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        
        .chart-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .chart-container {
            position: relative;
            height: 250px;
        }
        
        /* Positions Table */
        .positions-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .positions-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .positions-table th {
            text-align: left;
            padding: 12px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .positions-table td {
            padding: 15px 12px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .positions-table tr:hover {
            background: rgba(255,255,255,0.02);
        }
        
        .dir-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .dir-badge.LONG {
            background: rgba(0,210,106,0.15);
            color: var(--accent-green);
        }
        
        .dir-badge.SHORT {
            background: rgba(255,71,87,0.15);
            color: var(--accent-red);
        }
        
        .pnl-positive { color: var(--accent-green); }
        .pnl-negative { color: var(--accent-red); }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        
        .status-dot.active { background: var(--accent-green); }
        .status-dot.error { background: var(--accent-red); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success { background: var(--accent-green); }
        .toast.error { background: var(--accent-red); }
        .toast.info { background: var(--accent-blue); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Loading State */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* No Data State */
        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header { flex-direction: column; gap: 15px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .positions-table { font-size: 0.85rem; }
            .stat-value { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">NEKO.TRADING</div>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">🌙 Toggle Theme</button>
            </div>
        </header>
        
        <!-- Stats Grid -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Balance</div>
                <div class="stat-value" id="bal">$--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Daily PnL</div>
                <div class="stat-value" id="pnl">$--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Win Rate (7D)</div>
                <div class="stat-value c" id="winrate">--%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Closed PnL (7D)</div>
                <div class="stat-value" id="closedPnl">$--</div>
            </div>
        </section>
        
        <!-- Charts Row -->
        <section class="charts-row">
            <div class="chart-card">
                <div class="chart-title">📈 Equity Curve</div>
                <div class="chart-container">
                    <canvas id="equityChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">🥧 Portfolio Distribution</div>
                <div class="chart-container">
                    <canvas id="portfolioChart"></canvas>
                </div>
            </div>
        </section>
        
        <!-- Positions Section -->
        <section class="positions-section">
            <h2 class="section-title">📊 Open Positions</h2>
            <table class="positions-table">
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Direction</th>
                        <th>Entry</th>
                        <th>Current</th>
                        <th>Amount</th>
                        <th>Unrealized PnL</th>
                    </tr>
                </thead>
                <tbody id="positionsBody">
                    <tr><td colspan="6" class="no-data">Loading positions...</td></tr>
                </tbody>
            </table>
        </section>
        
        <!-- Footer -->
        <footer class="footer">
            <span class="status-dot active"></span>Scanner: Active
            <span style="margin-left:15px"></span>
            <span class="status-dot active"></span>Monitor: Active
            <span style="margin-left:15px"></span>
            <span id="ipAddress">--</span>
        </footer>
    </div>
    
    <script>
        // Theme Toggle
        let currentTheme = localStorage.getItem('theme') || 'dark';
        
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
        }
        
        // Apply saved theme
        document.documentElement.setAttribute('data-theme', currentTheme);
        
        // Chart instances
        let equityChart = null;
        let portfolioChart = null;
        
        // Initialize Charts
        function initCharts() {
            // Equity Curve Chart
            const equityCtx = document.getElementById('equityChart').getContext('2d');
            equityChart = new Chart(equityCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Balance',
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#8b8b9a' }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#8b8b9a' }
                        }
                    }
                }
            });
            
            // Portfolio Pie Chart
            const portfolioCtx = document.getElementById('portfolioChart').getContext('2d');
            portfolioChart = new Chart(portfolioCtx, {
                type: 'doughnut',
                data: {
                    labels: ['USDT', 'Positions'],
                    datasets: [{
                        data: [100, 0],
                        backgroundColor: ['#1a1a25', '#3b82f6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#8b8b9a' }
                        }
                    }
                }
            });
        }
        
        // Animate Value
        function animateValue(el, value, prefix = '', suffix = '', decimals = 2) {
            const start = parseFloat(el.textContent.replace(/[^0-9.-]/g, '')) || 0;
            const end = parseFloat(value) || 0;
            const duration = 1000;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = start + (end - start) * eased;
                el.textContent = prefix + current.toFixed(decimals) + suffix;
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }
        
        // Show Toast
        function showToast(type, title, message) {
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerHTML = '<strong>' + title + '</strong><br>' + message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        // Update Dashboard
        async function load() {
            try {
                const res = await fetch('/api');
                const data = await res.json();
                
                // Balance
                animateValue(document.getElementById('bal'), data.bal || 0, '$', '', 2);
                
                // PnL
                const pnl = data.pnl || 0;
                const pnlEl = document.getElementById('pnl');
                animateValue(pnlEl, pnl, '', '', 2);
                pnlEl.className = 'stat-value ' + (pnl >= 0 ? 'g' : 'r');
                
                // Stats
                const stats = data.stats || {};
                animateValue(document.getElementById('winrate'), stats.winrate || 0, '', '%', 1);
                animateValue(document.getElementById('closedPnl'), stats.closed_pnl || 0, '$', '', 2);
                
                // Positions
                updatePositions(data.pos || []);
                
                // Update Charts
                updateCharts(data);
                
            } catch (e) {
                console.error('Load error:', e);
                showToast('error', 'Error', 'Failed to load data');
            }
        }
        
        function updatePositions(positions) {
            const tbody = document.getElementById('positionsBody');
            if (positions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="no-data">No open positions</td></tr>';
                return;
            }
            
            tbody.innerHTML = positions.map(p => {
                const pnlClass = p.u >= 0 ? 'pnl-positive' : 'pnl-negative';
                const pnlPrefix = p.u >= 0 ? '+' : '';
                return '<tr>' +
                    '<td><strong>' + p.s + '</strong></td>' +
                    '<td><span class="dir-badge ' + p.d + '">' + p.d + '</span></td>' +
                    '<td>$' + (p.e || 0).toFixed(4) + '</td>' +
                    '<td>$' + (p.m || 0).toFixed(4) + '</td>' +
                    '<td>' + p.a.toFixed(2) + '</td>' +
                    '<td class="' + pnlClass + '">' + pnlPrefix + '$' + p.u.toFixed(2) + '</td>' +
                    '</tr>';
            }).join('');
        }
        
        function updateCharts(data) {
            // Update equity chart with new balance
            if (equityChart) {
                const now = new Date().toLocaleTimeString();
                equityChart.data.labels.push(now);
                equityChart.data.datasets[0].data.push(data.bal);
                
                // Keep last 20 data points
                if (equityChart.data.labels.length > 20) {
                    equityChart.data.labels.shift();
                    equityChart.data.datasets[0].data.shift();
                }
                equityChart.update();
            }
            
            // Update portfolio chart
            if (portfolioChart && data.pos && data.pos.length > 0) {
                const labels = data.pos.map(p => p.s);
                const values = data.pos.map(p => Math.abs(p.u || 0));
                const colors = data.pos.map(p => p.d === 'LONG' ? '#00d26a' : '#ff4757');
                
                portfolioChart.data.labels = labels;
                portfolioChart.data.datasets[0].data = values;
                portfolioChart.data.datasets[0].backgroundColor = colors;
                portfolioChart.update();
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            load();
            setInterval(load, 30000);
            
            // Fetch IP
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(d => document.getElementById('ipAddress').textContent = d.ip)
                .catch(() => {});
        });
    </script>
</body>
</html>
