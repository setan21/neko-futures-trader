<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEKO.TRADING</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --accent-green: #00d26a;
            --accent-red: #ff4757;
            --accent-blue: #3b82f6;
            --accent-yellow: #fbbf24;
            --accent-purple: #a855f7;
            --border-color: #2a2a3a;
        }
        
        [data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b7a;
            --border-color: #e0e0e0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
        }
        
        /* Header - Mobile First */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }
        
        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-actions { display: flex; gap: 8px; }
        
        .icon-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .icon-btn:hover { background: var(--accent-blue); }
        
        /* Balance Card - Prominent */
        .balance-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        
        .balance-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .balance-value {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .balance-pnl {
            font-size: 1.1rem;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
        }
        
        .balance-pnl.positive {
            background: rgba(0,210,106,0.15);
            color: var(--accent-green);
        }
        
        .balance-pnl.negative {
            background: rgba(255,71,87,0.15);
            color: var(--accent-red);
        }
        
        .blur { filter: blur(8px); user-select: none; }
        
        /* Stats Grid - 2x2 on mobile */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        .stat-value.g { color: var(--accent-green); }
        .stat-value.r { color: var(--accent-red); }
        .stat-value.c { color: var(--accent-yellow); }
        
        /* Charts - Stack on mobile */
        .charts-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .chart-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }
        
        .chart-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .chart-container { height: 200px; position: relative; }
        
        /* Positions Table */
        .positions-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            margin-bottom: 15px;
            overflow-x: auto;
        }
        
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .positions-table {
            width: 100%;
            min-width: 500px;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        
        .positions-table th {
            text-align: left;
            padding: 10px 8px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .positions-table td {
            padding: 12px 8px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .dir-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .dir-badge.LONG {
            background: rgba(0,210,106,0.15);
            color: var(--accent-green);
        }
        
        .dir-badge.SHORT {
            background: rgba(255,71,87,0.15);
            color: var(--accent-red);
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 15px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        
        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
        }
        
        .status-dot.active { background: var(--accent-green); }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success { background: var(--accent-green); }
        .toast.error { background: var(--accent-red); }
        .toast.info { background: var(--accent-blue); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* Desktop: larger screens */
        @media (min-width: 768px) {
            .container { padding: 20px; }
            .header { padding: 15px 25px; }
            .balance-card { text-align: left; display: flex; align-items: center; justify-content: space-between; }
            .balance-value { font-size: 2.5rem; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
            .charts-row { flex-direction: row; }
            .chart-container { height: 250px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header fade-in">
            <div class="logo">NEKO.TRADING</div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleBalance()" title="Show/Hide Balance">👁</button>
                <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
            </div>
        </header>
        
        <!-- Balance Card -->
        <div class="balance-card fade-in" style="animation-delay: 0.1s">
            <div>
                <div class="balance-label">TOTAL BALANCE</div>
                <div class="balance-value" id="bal">$--</div>
            </div>
            <div class="balance-pnl" id="pnl">$-- USDT</div>
        </div>
        
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card fade-in" style="animation-delay: 0.15s">
                <div class="stat-label">WIN RATE (7D)</div>
                <div class="stat-value c" id="winrate">--%</div>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.2s">
                <div class="stat-label">CLOSED PNL</div>
                <div class="stat-value" id="closedPnl">$--</div>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.25s">
                <div class="stat-label">AVG WIN</div>
                <div class="stat-value g" id="avgWin">$--</div>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.3s">
                <div class="stat-label">AVG LOSS</div>
                <div class="stat-value r" id="avgLoss">$--</div>
            </div>
        </div>
        
        <!-- Charts -->
        <div class="charts-row">
            <div class="chart-card fade-in" style="animation-delay: 0.35s; flex: 2">
                <div class="chart-title">📈 Equity Curve</div>
                <div class="chart-container">
                    <canvas id="equityChart"></canvas>
                </div>
            </div>
            <div class="chart-card fade-in" style="animation-delay: 0.4s; flex: 1">
                <div class="chart-title">🥧 Portfolio</div>
                <div class="chart-container">
                    <canvas id="portfolioChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- Positions -->
        <div class="positions-section fade-in" style="animation-delay: 0.45s">
            <h2 class="section-title">📊 Open Positions</h2>
            <table class="positions-table">
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Direction</th>
                        <th>Entry</th>
                        <th>Current</th>
                        <th>Amount</th>
                        <th>PnL</th>
                    </tr>
                </thead>
                <tbody id="positionsBody">
                    <tr><td colspan="6" style="text-align:center;color:var(--text-secondary)">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- Footer -->
        <footer class="footer fade-in" style="animation-delay: 0.5s">
            <span class="status-dot active"></span>Scanner: Active
            <span style="margin-left:15px"></span>
            <span class="status-dot active"></span>Monitor: Active
            <span style="margin-left:15px"></span>
            <span id="ipAddress">--</span>
        </footer>
    </div>
    
    <script>
        // State
        let balanceVisible = true;
        let currentTheme = localStorage.getItem('theme') || 'dark';
        let equityChart = null;
        let portfolioChart = null;
        let lastPnl = 0;
        
        // Apply theme
        document.documentElement.setAttribute('data-theme', currentTheme);
        
        function toggleBalance() {
            balanceVisible = !balanceVisible;
            const bal = document.getElementById('bal');
            const pnl = document.getElementById('pnl');
            if (balanceVisible) {
                bal.classList.remove('blur');
                pnl.style.display = 'inline-block';
            } else {
                bal.classList.add('blur');
                pnl.style.display = 'none';
            }
        }
        
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            // Update chart colors
            if (equityChart) equityChart.update();
            if (portfolioChart) portfolioChart.update();
        }
        
        // Init Charts
        function initCharts() {
            // Equity Chart
            const equityCtx = document.getElementById('equityChart').getContext('2d');
            equityChart = new Chart(equityCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8b9a', maxTicksLimit: 5 } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8b9a' } }
                    }
                }
            });
            
            // Portfolio Chart
            const portfolioCtx = document.getElementById('portfolioChart').getContext('2d');
            portfolioChart = new Chart(portfolioCtx, {
                type: 'doughnut',
                data: {
                    labels: ['USDT', 'Positions'],
                    datasets: [{ data: [100, 0], backgroundColor: ['#1a1a25', '#3b82f6'], borderWidth: 0 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: '#8b8b9a', boxWidth: 12, padding: 5 } } }
                }
            });
        }
        
        // Show Toast
        function showToast(type, title, msg) {
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.innerHTML = '<strong>' + title + '</strong><br>' + msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }
        
        // Animate Value
        function animateValue(el, value, prefix = '', suffix = '', decimals = 2) {
            const start = parseFloat(el.textContent.replace(/[^0-9.-]/g, '')) || 0;
            const end = parseFloat(value) || 0;
            const duration = 800;
            const startTime = performance.now();
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                el.textContent = prefix + (start + (end - start) * eased).toFixed(decimals) + suffix;
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }
        
        // Load Data
        async function load() {
            try {
                const res = await fetch('/api');
                const data = await res.json();
                
                // Balance
                animateValue(document.getElementById('bal'), data.bal || 0, '$', '', 2);
                
                // PnL
                const pnl = data.pnl || 0;
                const pnlEl = document.getElementById('pnl');
                animateValue(pnlEl, pnl, '', '', 2);
                pnlEl.className = 'balance-pnl ' + (pnl >= 0 ? 'positive' : 'negative');
                
                // Flash effect
                if (lastPnl !== 0 && pnl !== lastPnl) {
                    showToast(pnl > lastPnl ? 'success' : 'error', 'PnL Update', pnl > lastPnl ? 'Profit!' : 'Loss');
                }
                lastPnl = pnl;
                
                // Stats
                const stats = data.stats || {};
                animateValue(document.getElementById('winrate'), stats.winrate || 0, '', '%', 1);
                animateValue(document.getElementById('closedPnl'), stats.closed_pnl || 0, '$', '', 2);
                animateValue(document.getElementById('avgWin'), stats.avg_win || 0, '$', '', 2);
                animateValue(document.getElementById('avgLoss'), stats.avg_loss || 0, '$', '', 2);
                
                // Positions
                updatePositions(data.pos || []);
                
                // Charts
                updateCharts(data);
                
            } catch (e) {
                console.error('Load error:', e);
            }
        }
        
        function updatePositions(positions) {
            const tbody = document.getElementById('positionsBody');
            if (!positions.length) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-secondary)">No open positions</td></tr>';
                return;
            }
            tbody.innerHTML = positions.map(p => {
                const pnlClass = p.u >= 0 ? 'color:var(--accent-green)' : 'color:var(--accent-red)';
                const pnlPrefix = p.u >= 0 ? '+' : '';
                return '<tr>' +
                    '<td><strong>' + p.s + '</strong></td>' +
                    '<td><span class="dir-badge ' + p.d + '">' + p.d + '</span></td>' +
                    '<td>$' + (p.e || 0).toFixed(4) + '</td>' +
                    '<td>$' + (p.m || 0).toFixed(4) + '</td>' +
                    '<td>' + p.a.toFixed(2) + '</td>' +
                    '<td style="' + pnlClass + '">' + pnlPrefix + '$' + p.u.toFixed(2) + '</td>' +
                    '</tr>';
            }).join('');
        }
        
        function updateCharts(data) {
            if (!equityChart) return;
            const now = new Date().toLocaleTimeString();
            equityChart.data.labels.push(now);
            equityChart.data.datasets[0].data.push(data.bal);
            if (equityChart.data.labels.length > 20) {
                equityChart.data.labels.shift();
                equityChart.data.datasets[0].data.shift();
            }
            equityChart.update();
            
            if (portfolioChart && data.pos && data.pos.length) {
                portfolioChart.data.labels = data.pos.map(p => p.s);
                portfolioChart.data.datasets[0].data = data.pos.map(p => Math.abs(p.u || 1));
                portfolioChart.data.datasets[0].backgroundColor = data.pos.map(p => p.d === 'LONG' ? '#00d26a' : '#ff4757');
                portfolioChart.update();
            }
        }
        
        // Init
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            load();
            setInterval(load, 30000);
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(d => document.getElementById('ipAddress').textContent = d.ip)
                .catch(() => {});
        });
    </script>
</body>
</html>
