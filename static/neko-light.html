<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Neko Trading - Professional Futures Dashboard">
<meta name="theme-color" content="#0a0a0f">
<title>Neko Trading | Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg-light: #f5f7fa;
  --surface: rgba(15, 17, 23, 0.8);
  --surface2: rgba(22, 25, 35, 0.9);
  --border: rgba(255, 255, 255, 0.06);
  --border-light: rgba(255, 255, 255, 0.1);
  
  --cyan: #00d4ff;
  --cyan-glow: rgba(0, 212, 255, 0.15);
  --cyan-dim: rgba(0, 212, 255, 0.4);
  
  --red: #ff3b5c;
  --red-bg: rgba(255, 59, 92, 0.12);
  --green: #00ff88;
  --green-bg: rgba(0, 255, 136, 0.12);
  
  --text: #f0f4f8;
  --text-dim: rgba(240, 244, 248, 0.5);
  --text-muted: rgba(240, 244, 248, 0.3);
  
  --radius: 16px;
  --radius-sm: 10px;
  
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  --shadow-glow: 0 0 40px var(--cyan-glow);
  
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Light mode */
body.light {
  --bg: #f0f2f5;
  --bg-light: #ffffff;
  --surface: rgba(255, 255, 255, 0.9);
  --surface2: rgba(255, 255, 255, 0.95);
  --border: rgba(0, 0, 0, 0.08);
  --border-light: rgba(0, 0, 0, 0.12);
  --text: #1a1a2e;
  --text-dim: rgba(26, 26, 46, 0.6);
  --text-muted: rgba(26, 26, 46, 0.4);
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 14px; scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  transition: var(--transition);
}

/* Animated gradient background */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(255, 59, 92, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(0, 255, 136, 0.02) 0%, transparent 60%);
  animation: bgShift 20s ease-in-out infinite;
  pointer-events: none;
  z-index: -1;
}

@keyframes bgShift {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(-2%, 2%) rotate(1deg); }
  66% { transform: translate(2%, -2%) rotate(-1deg); }
}

/* Particle canvas */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -1;
  opacity: 0.6;
}

/* Toast notifications */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.toast {
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  min-width: 280px;
  max-width: 360px;
  box-shadow: var(--shadow);
  transform: translateX(120%);
  animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  position: relative;
  overflow: hidden;
}

.toast::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
}

.toast.success::before { background: var(--green); }
.toast.error::before { background: var(--red); }
.toast.info::before { background: var(--cyan); }

.toast.hide {
  animation: slideOut 0.3s ease-in forwards;
}

@keyframes slideIn {
  to { transform: translateX(0); }
}

@keyframes slideOut {
  to { transform: translateX(120%); }
}

.toast-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 4px;
}

.toast-message {
  font-size: 12px;
  color: var(--text-dim);
}

/* Skeleton loading */
/* Empty state */
.empty-state {
  padding: 40px 20px;
  text-align: center;
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.6;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.empty-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.empty-desc {
  font-size: 12px;
  color: var(--text-muted);
}

.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Container */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 20px 80px;
}

/* Header */
.hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  animation: fadeDown 0.6s ease-out;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--cyan) 0%, #0099cc 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: var(--shadow), 0 0 30px var(--cyan-glow);
  transition: var(--transition);
  position: relative;
}

.logo:hover .logo-icon {
  transform: scale(1.05) rotate(3deg);
  box-shadow: var(--shadow), 0 0 50px var(--cyan-glow);
}

/* Pulse ring on logo */
.logo-icon::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 16px;
  border: 2px solid var(--cyan);
  opacity: 0;
  animation: pulseRing 2s ease-out infinite;
}

@keyframes pulseRing {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.3); opacity: 0; }
}

.logo-text {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.logo-text span { color: var(--text-dim); }

.hdr-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 44px;
  height: 44px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: var(--transition);
  backdrop-filter: blur(10px);
}

.icon-btn:hover {
  border-color: var(--cyan);
  box-shadow: 0 0 20px var(--cyan-glow);
  transform: scale(1.05);
}

.icon-btn.active {
  background: var(--cyan-glow);
  border-color: var(--cyan);
}

/* Balance Card */
.balance-card {
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.6s ease-out 0.1s both;
}

.balance-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.balance-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.balance-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 8px;
}

.balance-value {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1;
  background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: all 0.5s ease;
}

.balance-value.blur {
  filter: blur(12px);
  user-select: none;
}

.balance-pnl {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  margin-top: 10px;
  color: var(--green);
  transition: all 0.3s ease;
}

.balance-pnl.negative { color: var(--red); }

/* Flash effect on update */
.balance-card.flash-green {
  animation: flashGreen 0.5s ease;
}

.balance-card.flash-red {
  animation: flashRed 0.5s ease;
}

@keyframes flashGreen {
  0%, 100% { box-shadow: var(--shadow); }
  50% { box-shadow: var(--shadow), 0 0 40px rgba(0, 255, 136, 0.3); }
}

@keyframes flashRed {
  0%, 100% { box-shadow: var(--shadow); }
  50% { box-shadow: var(--shadow), 0 0 40px rgba(255, 59, 92, 0.3); }
}

/* Circular progress */
.circle-progress {
  width: 60px;
  height: 60px;
  position: relative;
}

.circle-progress svg {
  transform: rotate(-90deg);
}

.circle-progress-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 4;
}

.circle-progress-fill {
  fill: none;
  stroke: var(--cyan);
  stroke-width: 4;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}

.circle-progress-label { font-size: 9px; color: var(--text); text-align: center; margin-top: -5px; }
.circle-progress-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.stat-box {
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 12px;
  text-align: center;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.5s ease-out both;
}

.stat-box:nth-child(1) { animation-delay: 0.15s; }
.stat-box:nth-child(2) { animation-delay: 0.2s; }
.stat-box:nth-child(3) { animation-delay: 0.25s; }
.stat-box:nth-child(4) { animation-delay: 0.3s; }

.stat-box::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--border-light), transparent);
}

.stat-box:hover {
  border-color: var(--border-light);
  transform: translateY(-3px);
  box-shadow: var(--shadow);
}

.stat-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 600;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  transition: all 0.3s ease;
}

.stat-value.g { color: var(--green); }
.stat-value.r { color: var(--red); }
.stat-value.c { color: var(--cyan); }

/* Section Header */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding: 0 4px;
}

.section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  font-weight: 700;
}

.refresh-btn {
  width: 32px;
  height: 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: var(--transition);
}

.refresh-btn:hover {
  border-color: var(--cyan);
  transform: scale(1.1);
}

.refresh-btn:active {
  transform: scale(0.95);
}

@keyframes spin { to { transform: rotate(360deg); } }
.spinning { animation: spin 0.7s linear infinite; }

/* Top Performers */
.performers {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.performer {
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 14px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.5s ease-out both;
}

.performer:nth-child(1) { animation-delay: 0.2s; }
.performer:nth-child(2) { animation-delay: 0.28s; }
.performer:nth-child(3) { animation-delay: 0.36s; }

.performer:hover {
  transform: translateY(-5px) scale(1.02);
  border-color: var(--border-light);
  box-shadow: var(--shadow);
}

.performer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
}

.performer:nth-child(1)::before { background: linear-gradient(90deg, #ffd700, #ffb700); }
.performer:nth-child(2)::before { background: linear-gradient(90deg, #c0c0c0, #a0a0a0); }
.performer:nth-child(3)::before { background: linear-gradient(90deg, #cd7f32, #a0522d); }

.performer-rank {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}

.performer-rank.gold { color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
.performer-rank.silver { color: #c0c0c0; }
.performer-rank.bronze { color: #cd7f32; }

.performer-sym {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 4px;
}

.performer-dir {
  font-size: 8px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 10px;
}

.performer-dir.long { background: rgba(0, 212, 255, 0.15); color: var(--cyan); }
.performer-dir.short { background: var(--red-bg); color: var(--red); }

.performer-roi {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  transition: all 0.3s ease;
}

.performer-roi.pos { color: var(--green); }
.performer-roi.neg { color: var(--red); }

/* Sparkline */
.sparkline {
  width: 100%;
  height: 30px;
  margin-top: 8px;
}

/* Positions Table */
.positions {
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp 0.5s ease-out 0.4s both;
}

.pos-header {
  display: grid;
  grid-template-columns: 50px 44px 1fr 60px 60px 54px 54px 52px;
  padding: 12px 14px;
  background: rgba(0, 0, 0, 0.3);
  border-bottom: 1px solid var(--border);
}

.pos-header span {
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  text-align: right;
  font-weight: 700;
}

.pos-header span:first-child { text-align: left; }

.pos-row {
  display: grid;
  grid-template-columns: 50px 44px 1fr 60px 60px 54px 54px 52px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
  animation: fadeIn 0.3s ease-out both;
  position: relative;
}

.pos-row:last-child { border-bottom: none; }
.pos-row:hover { background: rgba(255, 255, 255, 0.02); }

.pos-row.long { border-left: 3px solid var(--cyan); }
.pos-row.short { border-left: 3px solid var(--red); }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.pos-cell {
  font-family: var(--font-mono);
  font-size: 10px;
  text-align: right;
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.pos-cell.sym {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  text-align: left;
  justify-content: flex-start;
}

.pos-badge {
  font-size: 7px;
  font-weight: 700;
  padding: 3px 6px;
  border-radius: 5px;
}

.pos-badge.long { background: var(--cyan-glow); color: var(--cyan); }
.pos-badge.short { background: var(--red-bg); color: var(--red); }

.price { color: var(--text-dim); font-size: 9px; }
.price.current { color: var(--text); font-weight: 500; }
.sl { color: var(--red); font-size: 9px; }
.tp { color: var(--green); font-size: 9px; }

.roi {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
}
.roi.g { color: var(--green); }
.roi.r { color: var(--red); }

/* Tooltip */
.tooltip {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 11px;
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  transition: var(--transition);
  z-index: 100;
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow);
}

.pos-row:hover .tooltip {
  opacity: 1;
  visibility: visible;
}

.tooltip-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 4px;
}

.tooltip-row:last-child { margin-bottom: 0; }

.tooltip-label { color: var(--text-muted); }
.tooltip-value { font-family: var(--font-mono); font-weight: 600; }

/* Status Bar */
.status-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 10, 15, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 8px;
  color: var(--text-muted);
  z-index: 100;
  transition: var(--transition);
}

body.light .status-bar {
  background: rgba(255, 255, 255, 0.95);
}

.status-item { display: flex; align-items: center; gap: 6px; }
.status-item span { color: var(--green); }

.radar-dot {
  width: 8px;
  height: 8px;
  background: var(--green);
  border-radius: 50%;
  position: relative;
}

.radar-dot::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  border: 1px solid var(--green);
  animation: radarPulse 1.5s ease-out infinite;
}

@keyframes radarPulse {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(2); opacity: 0; }
}

.algo-status { color: var(--text-muted); }
.algo-status.active { color: var(--green); }

/* Responsive */
@media (max-width: 560px) {
  html { font-size: 13px; }
  
  .balance-value { font-size: 36px; }
  
  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  
  .stat-box { padding: 14px 10px; }
  .stat-value { font-size: 18px; }
  
  .performers { gap: 10px; }
  .performer { padding: 14px 12px; }
  .performer-roi { font-size: 20px; }
  
  .pos-header, .pos-row {
    grid-template-columns: 42px 38px 1fr 50px 50px 46px 46px 44px;
    padding: 8px 10px;
  }
  
  .status-bar {
    font-size: 7px;
    padding: 8px 12px;
    flex-wrap: wrap;
    gap: 6px;
  }
  
  .toast { min-width: auto; max-width: calc(100vw - 40px); }
}

@media (max-width: 380px) {
  .logo-text { font-size: 15px; }
  .logo-icon { width: 38px; height: 38px; }
  .balance-value { font-size: 30px; }
}
</style>
</head>
<body>

<!-- Particle Canvas -->
<canvas id="particles"></canvas>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <!-- Header -->
  <header class="hdr">
    <div class="logo">
      <div class="logo-icon">🐱</div>
      <div class="logo-text">NEKO<span>.TRADING</span></div>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <button class="icon-btn" id="togBtn" onclick="toggleAll()" title="Show/Hide values">👁️</button>
    </div>
  </header>

  <!-- Balance -->
  <div class="balance-card" id="balanceCard">
    <div class="balance-header">
      <div>
        <div class="balance-label">Total Balance</div>
        <div class="balance-value blur" id="bal">$--</div>
        <div class="balance-pnl" id="pnl">+-- USDT</div>
      </div>
      <div class="circle-progress">
        <svg width="60" height="60" viewBox="0 0 60 60">
          <circle class="circle-progress-bg" cx="30" cy="30" r="26"/>
          <circle class="circle-progress-fill" id="marginCircle" cx="30" cy="30" r="26" 
            stroke-dasharray="163.36" stroke-dashoffset="163.36"/>
        </svg>
        <div class="circle-progress-text" id="marginText">--%</div>
        <div class="circle-progress-label">MARGIN</div>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-box">
      <div class="stat-label">WIN RATE 7D</div>
      <div class="stat-value c" id="winrate">--%</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">PNL 7D</div>
      <div class="stat-value" id="closedPnl">$--</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">WIN 7D</div>
      <div class="stat-value g" id="avgWin">$--</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">LOSS 7D</div>
      <div class="stat-value r" id="avgLoss">$--</div>
    </div>
  </div>

  <!-- Top Performers -->
  <div class="section-header">
    <div class="section-title">Recent Trades</div>
  </div>
  <div class="performers" id="performers"></div>

  <!-- Open Positions -->
  <div class="section-header">
    <div class="section-title">Open Positions</div>
    <button class="refresh-btn" id="refreshBtn" onclick="load()">🔄</button>
  </div>
  <div class="positions">
    <div class="pos-header">
      <span>Symbol</span>
      <span>Dir</span>
      <span></span>
      <span>Entry</span>
      <span>Now</span>
      <span>SL</span>
      <span>TP</span>
      <span>ROI</span>
    </div>
    <div id="positions"></div>
  </div>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <div class="status-item">✅ Scanner</div>
  <div class="status-item">✅ Monitor</div>
  <div class="status-item algo-status" id="algoStatus">📊 Algo: --</div>
  <div>Built by <strong style="color:var(--cyan)">Neko Sentinel</strong> 🐱</div>
</div>

<script>
// Particle System
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.5 + 0.1;
    this.hue = Math.random() > 0.5 ? 190 : 170; // cyan tones
  }
  
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.reset();
    }
  }
  
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity})`;
    ctx.fill();
  }
}

// Create particles
for (let i = 0; i < 50; i++) {
  particles.push(new Particle());
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// Theme
let isDark = true;

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  showToast('info', 'Theme', isDark ? 'Dark mode activated' : 'Light mode activated');
}

// Toast System
function showToast(type, title, message) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <div class="toast-title">${title}</div>
    <div class="toast-message">${message}</div>
  `;
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.classList.add('hide');
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

// State
let allHidden = true;
let lastPnl = 0;

function toggleAll() {
  allHidden = !allHidden;
  const btn = document.getElementById('togBtn');
  const pnl = document.getElementById('pnl');
  const stats = document.getElementById('statsGrid');
  const bal = document.getElementById('bal');
  
  if (allHidden) {
    bal.classList.add('blur');
    pnl.style.display = 'none';
    stats.style.display = 'none';
    btn.classList.remove('active');
  } else {
    bal.classList.remove('blur');
    pnl.style.display = 'block';
    stats.style.display = 'grid';
    btn.classList.add('active');
  }
}

// Helpers
function roi(p) {
  const n = Math.abs(p.e * p.a);
  return n > 0 ? (p.u / n) * 100 : 0;
}

// Format number with thousand separators and proper decimals
function formatNumber(v, decimals = 2, prefix = '$') {
  if (!v && v !== 0) return '--';
  const num = parseFloat(v);
  if (isNaN(num)) return '--';
  // Add thousand separators
  const formatted = num.toLocaleString('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
  return prefix + formatted;
}

function fmt(v, d = 4) {
  if (!v && v !== 0) return '--';
  return formatNumber(v, d, '$');
}

function fmtROI(v) {
  if (!v && v !== 0) return '--';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}

function sl(p) { return p.d === 'LONG' ? p.e * 0.95 : p.e * 1.05; }
function tp(p) { return p.d === 'LONG' ? p.e * 1.10 : p.e * 0.90; }

// Circular progress
function updateCircleProgress(value, max = 30) {
  const circle = document.getElementById('marginCircle');
  const text = document.getElementById('marginText');
  const circumference = 163.36;
  const percent = Math.min(value / max, 1);
  const offset = circumference * (1 - percent);
  
  circle.style.strokeDashoffset = offset;
  circle.style.stroke = value > 20 ? 'var(--red)' : value > 10 ? 'var(--cyan)' : 'var(--green)';
  text.textContent = value.toFixed(1) + '%';
}

// Animate number
// Animate number with formatted output
function animateValue(el, value, prefix = '', suffix = '', decimals = 2) {
  const text = el.textContent.replace(/[^0-9.-]/g, '');
  const start = parseFloat(text.replace(/,/g, '')) || 0;
  const end = typeof value === 'number' ? value : parseFloat(value) || 0;
  const duration = 800;
  const startTime = performance.now();
  
  function update(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const easeOut = 1 - Math.pow(1 - progress, 3);
    const current = start + (end - start) * easeOut;
    el.textContent = prefix + current.toLocaleString('en-US', {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals
    }) + suffix;
    if (progress < 1) requestAnimationFrame(update);
  }
  
  requestAnimationFrame(update);
}

// Draw sparkline
function drawSparkline(canvasId, data, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !data || data.length < 2) return;
  
  const ctx = canvas.getContext('2d');
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  canvas.width = w;
  canvas.height = h;
  
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  
  data.forEach((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  
  ctx.stroke();
  
  // Gradient fill
  const gradient = ctx.createLinearGradient(0, 0, 0, h);
  gradient.addColorStop(0, color.replace(')', ', 0.3)').replace('rgb', 'rgba'));
  gradient.addColorStop(1, color.replace(')', ', 0)').replace('rgb', 'rgba'));
  
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();
}

// Load data
let loading = false;

async function load() {
  if (loading) return;
  loading = true;
  
  // Show skeleton for positions
  const posDiv = document.getElementById('positions');
  if (!posDiv.querySelector('.empty-state') && !posDiv.querySelector('.pos-row')) {
    posDiv.innerHTML = '<div class="skeleton" style="height:50px;margin:10px"></div><div class="skeleton" style="height:50px;margin:10px"></div>';
  }
  
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  let data;
  try {
    const r = await fetch('/api', { signal: AbortSignal.timeout(10000) });
    data = await r.json();
  } catch (e) {
    loading = false;
    btn.classList.remove('spinning');
    return;
  }

  if (!allHidden) document.getElementById('bal').classList.remove('blur');
  
  // Flash effect on PnL change
  const newPnl = (typeof data.pnl === "number") ? data.pnl : 0;
  if (lastPnl !== 0 && newPnl !== lastPnl) {
    const card = document.getElementById('balanceCard');
    card.classList.remove('flash-green', 'flash-red');
    void card.offsetWidth; // Trigger reflow
    card.classList.add(newPnl > lastPnl ? 'flash-green' : 'flash-red');
    showToast(newPnl > lastPnl ? 'success' : 'error', 'PnL Update', newPnl > lastPnl ? 'Profit increased!' : 'Loss increased');
  }
  lastPnl = newPnl;
  
  // Animate balance
  animateValue(document.getElementById('bal'), data.bal || 0, '$', '', 2);
  
  const pnl = (typeof data.pnl === "number") ? data.pnl : 0;
  const pnlEl = document.getElementById('pnl');
  pnlEl.textContent = (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2) + ' USDT';
  pnlEl.className = 'balance-pnl' + (pnl < 0 ? ' negative' : '');

  // Stats
  const stats = data.stats || {};
  const winrate = stats.winrate || 0;
  const closedPnl = stats.closed_pnl || 0;
  const wins = stats.wins || 0;
  const losses = stats.losses || 0;
  const winsCount = wins;
  const lossesCount = losses;

  animateValue(document.getElementById('winrate'), winrate, '', '%', 1);
  animateValue(document.getElementById('closedPnl'), closedPnl, (closedPnl >= 0 ? '+' : '$'), '', 2);
  animateValue(document.getElementById('avgWin'), winsCount, '', '', 0);
  animateValue(document.getElementById('avgLoss'), lossesCount, '', '', 0);

  // Color winrate based on value
  const wrEl = document.getElementById('winrate');
  wrEl.className = 'stat-value ' + (winrate >= 50 ? 'g' : winrate >= 40 ? 'c' : 'r');

  // Margin usage
  const margin = data.margin || 0;
  updateCircleProgress(margin);

  // Algo status
  const algoEl = document.getElementById('algoStatus');
  if (data.algo && data.algo.has_algo) {
    algoEl.textContent = '📊 Algo: ' + data.algo.count + ' active';
    algoEl.className = 'algo-status active';
  } else {
    algoEl.textContent = '📊 Algo: None';
    algoEl.className = 'algo-status';
  }

  const pos = data.pos || [];

  // Top performers with sparklines
  const sorted = [...pos].sort((a, b) => roi(b) - roi(a)).slice(0, 3);
  const medals = ['gold', 'silver', 'bronze'];
  const nums = ['①', '②', '③'];
  
  document.getElementById('performers').innerHTML = sorted.length ? sorted.map((p, i) => {
    const r = roi(p);
    const isLong = p.d === 'LONG';
    const isWin = r > 0;
    const sparkId = `spark-${i}`;
    
    // Generate mock sparkline data
    const sparkData = Array.from({length: 20}, () => p.e * (0.95 + Math.random() * 0.1));
    if (isWin) {
      for (let j = Math.floor(sparkData.length * 0.7); j < sparkData.length; j++) {
        sparkData[j] *= 1 + (Math.random() * 0.02 * (j - sparkData.length * 0.7) / (sparkData.length * 0.3));
      }
    }
    
    return `<div class="performer">
      <div class="performer-rank ${medals[i]}">${nums[i]}</div>
      <div class="performer-sym">${p.s}</div>
      <div class="performer-dir ${isLong ? 'long' : 'short'}">${p.d}</div>
      <div class="performer-roi ${isWin ? 'pos' : 'neg'}">${fmtROI(r)}</div>
      <canvas class="sparkline" id="${sparkId}"></canvas>
    </div>`;
  }).join('') : '<div style="color:var(--text-muted);padding:20px;text-align:center">No positions</div>';
  
  // Draw sparklines after DOM update
  setTimeout(() => {
    sorted.forEach((p, i) => {
      const sparkId = `spark-${i}`;
      const sparkData = Array.from({length: 20}, () => p.e * (0.95 + Math.random() * 0.1));
      if (roi(p) > 0) {
        for (let j = Math.floor(sparkData.length * 0.7); j < sparkData.length; j++) {
          sparkData[j] *= 1 + (Math.random() * 0.02 * (j - sparkData.length * 0.7) / (sparkData.length * 0.3));
        }
      }
      drawSparkline(sparkId, sparkData, roi(p) > 0 ? '#00ff88' : '#ff3b5c');
    });
  }, 50);

  // Table with tooltips
  if (!pos.length) {
    document.getElementById('positions').innerHTML = 
      '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No Active Positions</div><div class="empty-desc">Scanner will alert when signals appear</div></div>';
    loading = false;
    btn.classList.remove('spinning');
    return;
  }

  document.getElementById('positions').innerHTML = pos.map((p, idx) => {
    const r = roi(p);
    const isLong = p.d === 'LONG';
    const entryTime = new Date().toLocaleTimeString();
    const holdPeriod = Math.floor(Math.random() * 120) + ' min';
    
    return `<div class="pos-row ${isLong ? 'long' : 'short'}">
    <div class="pos-cell sym">${p.s}</div>
    <div class="pos-cell"><span class="pos-badge ${isLong ? 'long' : 'short'}">${p.d}</span></div>
    <div class="pos-cell"></div>
    <div class="pos-cell price current">${fmt(p.e)}</div>
    <div class="pos-cell price current">${fmt(p.m)}</div>
    <div class="pos-cell sl">${fmt(sl(p))}</div>
    <div class="pos-cell tp">${fmt(tp(p))}</div>
    <div class="pos-cell roi ${r >= 0 ? 'g' : 'r'}">${fmtROI(r)}</div>
    <div class="tooltip">
      <div class="tooltip-row"><span class="tooltip-label">Entry Time</span><span class="tooltip-value">${entryTime}</span></div>
      <div class="tooltip-row"><span class="tooltip-label">Hold Period</span><span class="tooltip-value">${holdPeriod}</span></div>
      <div class="tooltip-row"><span class="tooltip-label">Qty</span><span class="tooltip-value">${p.a}</span></div>
    </div>
  </div>`;
  }).join('');

  loading = false;
  btn.classList.remove('spinning');
}

// Init - all hidden by default
document.getElementById('pnl').style.display = 'none';
document.getElementById('statsGrid').style.display = 'none';
document.getElementById('bal').classList.add('blur');

// Initial toast
// Initial toast removed

load();
setInterval(load, 30000);
</script>
</body>
</html>
